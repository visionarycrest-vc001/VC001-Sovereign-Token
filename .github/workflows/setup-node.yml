name: 🛠️ Setup Node

on:
  push:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '18.x'
      - name: Install dependencies for all workspaces
        run: npm install
